<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Płuca Planety - KONIEC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { border-radius: 0 !important; }
        
        body { 
            font-family: 'Helvetica', 'Arial', sans-serif; 
            background-color: #f1f5f9; 
            color: #0f172a; 
        }

        .fade-in { 
            animation: fadeIn 0.5s ease-out; 
        }

        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .neo-shadow {
            shadow-[8px_8px_0px_0px_rgba(0,0,0,0.1)];
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="bg-[#064e3b] text-white p-6 border-b-4 border-[#043d2e]">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black tracking-tighter uppercase">PŁUCA PLANETY</h1>
        </div>
    </nav>

    <main class="flex-grow container mx-auto max-w-2xl p-6 flex items-center justify-center">
        <div class="w-full bg-white p-10 md:p-16 shadow-[8px_8px_0px_0px_rgba(0,0,0,0.1)] border-2 border-black fade-in text-center">
            
            <div class="mb-8 flex justify-center">
                <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="square" stroke-linejoin="miter">
                    <rect x="3" y="11" width="18" height="11" rx="0" ry="0"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
            </div>

            <h2 class="text-3xl font-black mb-6 text-[#064e3b] uppercase tracking-tight leading-tight">
                Zakończono zbieranie wyników
            </h2>
            
            <div class="inline-block p-6 bg-slate-50 border-2 border-black mb-8">
                <p class="text-gray-800 font-bold uppercase tracking-widest text-sm">
                    Panel z konsolą wyników został zablokowany
                </p>
            </div>

            <p class="text-gray-500 text-xs font-bold uppercase tracking-[0.2em] border-t-2 border-slate-100 pt-8">
                System zamknięty • SP387 W-wa
            </p>
        </div>
    </main>

    <footer class="p-8 text-center text-gray-400">
        <p class="text-[10px] font-bold uppercase tracking-[0.1em]">Dzień Ziemi 2026 w SP 387 W-wa</p>
    </footer>

</body>
</html>
